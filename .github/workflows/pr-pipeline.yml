name: PR Pipeline

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-format:
    name: 1. Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore RabbitMQ.sln

      - name: Verify .NET Format
        run: dotnet format RabbitMQ.sln --verify-no-changes

  build:
    name: 2. Build
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore RabbitMQ.sln

      - name: Build Solution
        run: dotnet build RabbitMQ.sln --configuration Release --no-restore

  test:
    name: 3. Automated Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore RabbitMQ.sln

      - name: Run Tests
        # No test projects exist yet — this step is a no-op until tests are added.
        # dotnet test will succeed with 0 tests found.
        run: dotnet test RabbitMQ.sln --configuration Release --no-restore --verbosity normal

  ai-review:
    name: 4. AI Code Review
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Execute Gemini AI Review
        uses: sshnaidm/gemini-code-review-action@v2
        with:
          gemini-key: ${{ secrets.GEMINIAI }}
          model: gemini-2.5-flash
          prompt: |
            Act as a Senior Backend Engineer specializing in .NET Core (C#) and message-driven architectures using RabbitMQ.
            Review the provided code diff thoroughly. Do not comment on trivial style or formatting issues (like indentation or missing semicolons).
            Instead, focus heavily on the following critical areas:

            1. RABBITMQ & MESSAGING:
               - Correct usage of IConnection, IChannel (or IModel) lifecycles — ensure they are not shared across threads or disposed prematurely.
               - Proper consumer acknowledgement patterns (BasicAck, BasicNack, BasicReject) and dead-letter queue considerations.
               - Durable queues, persistent message delivery modes, and exchange/binding correctness.
               - Graceful shutdown of hosted services (IHostedService / BackgroundService) and connection cleanup.

            2. BACKEND (.NET):
               - Proper async/await usage (avoiding .Result, .Wait(), or missing await keywords).
               - Clean dependency injection patterns and correct object lifetimes (Transient vs Scoped vs Singleton) — especially important for RabbitMQ connections.
               - Robust exception handling, retry logic, and structured logging patterns.
               - Configuration binding from appsettings.json (e.g., RabbitMQ hostnames, credentials) using the Options pattern.

            3. SECURITY & PERFORMANCE:
               - Hardcoded credentials or secrets in code/config files.
               - Memory leaks, unmanaged resource disposal (using/IDisposable), or unoptimized message processing loops.
               - Unprotected API endpoints or missing input validation.

            4. TONE OF FEEDBACK:
               - Keep your comments professional, highly constructive, and concise.
               - State exactly what the issue is, why it matters, and provide a short code example of the recommended fix where applicable.
               - IF THE CODE IS WELL-WRITTEN AND LOOKS GOOD: Do not leave empty or negative reviews. Instead, explicitly post a single supportive comment stating exactly: "LGTM! The code follows best practices and no issues were found."
